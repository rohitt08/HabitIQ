version: "3.9"

services:
  server:
    build: ./backend
    container_name: habit-server
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - fullstack-net
    restart: unless-stopped

  client:
    build: ./frontend
    container_name: habit-client
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge