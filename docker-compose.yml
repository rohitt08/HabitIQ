
services:
  server:
    build: ./backend
    image: habitiq-server:V1.0.0
    container_name: habit-server
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - fullstack-net
    restart: unless-stopped

  client:
    build: ./frontend
    image: habitiq-client:V1.0.0
    container_name: habit-client
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge